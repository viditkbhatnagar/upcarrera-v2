name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter @upcarrera/api exec prisma generate
      - name: Build API (NestJS)
        run: pnpm --filter @upcarrera/api build
      - name: Build Web (Next.js — also typechecks)
        run: pnpm --filter @upcarrera/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api

  e2e:
    name: API e2e tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: upcarrera
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/upcarrera"
      JWT_SECRET: "ci-test-secret-not-for-production"
      JWT_EXPIRES_IN: "7d"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Prisma generate
        working-directory: apps/api
        run: pnpm exec prisma generate
      # Build the CI schema straight from schema.prisma (no MariaDB-dialect dump
      # needed), then load the small PII-free fixture — both via Prisma, so no
      # mysql client (and no MySQL-8 auth-plugin issues) are involved.
      - name: Push schema to CI database
        working-directory: apps/api
        run: pnpm exec prisma db push --skip-generate --accept-data-loss
      - name: Seed CI database
        working-directory: apps/api
        run: pnpm exec prisma db execute --file ../../database/ci-seed.sql --schema prisma/schema.prisma
      - name: Run e2e tests (Jest + Supertest)
        working-directory: apps/api
        run: pnpm exec jest --config ./test/jest-e2e.json --runInBand
