# upCarrera reverse proxy — admin + admissions surfaces on one droplet.
#
# Both hostnames serve the SAME Next.js build (server-side RBAC segments admins
# vs counsellors). Each proxies its OWN origin's /api to the Nest API, so when the
# web bundle calls the API with a relative `/api` base it stays same-origin on
# BOTH domains and no CORS config is required. If the two surfaces later diverge
# into separate builds, split this into two server blocks pointing at two web
# upstreams (e.g. 3001 and 3002) and rebuild each with its own NEXT_PUBLIC_API_URL.
#
# Install on the droplet:
#   sudo cp deploy/nginx/upcarrera.conf /etc/nginx/sites-available/upcarrera.conf
#   sudo ln -sf /etc/nginx/sites-available/upcarrera.conf /etc/nginx/sites-enabled/upcarrera.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d admin.upcarrera.com -d admissions.upcarrera.com
# certbot rewrites this file to add the TLS listeners and the 80->443 redirect.

upstream upcarrera_web { server 127.0.0.1:3001; keepalive 16; }
upstream upcarrera_api { server 127.0.0.1:3000; keepalive 16; }

server {
  listen 80;
  listen [::]:80;
  server_name admin.upcarrera.com admissions.upcarrera.com;

  # Allow the files module's uploads/downloads through the proxy.
  client_max_body_size 25m;

  # API — proxy_pass with no URI part preserves the full path, so /api/... reaches
  # the Nest app unchanged (it sets the global 'api' prefix in main.ts).
  location /api/ {
    proxy_pass http://upcarrera_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 120s;
  }

  # Everything else — the Next.js staff app.
  location / {
    proxy_pass http://upcarrera_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
