# upCarrera reverse proxy — admin + admissions on one droplet.
#
# The web app is a STATIC Vite SPA (apps/web/dist) served directly by nginx; only
# the Nest API runs as a Node process (127.0.0.1:3000). Both hostnames serve the
# SAME SPA build (server-side RBAC segments admins vs counsellors), and each
# proxies its OWN /api, so the browser bundle calls the API same-origin via a
# relative VITE_API_URL=/api — no CORS configuration needed.
#
# Install on the droplet:
#   sudo cp deploy/nginx/upcarrera.conf /etc/nginx/sites-available/upcarrera.conf
#   sudo ln -sf /etc/nginx/sites-available/upcarrera.conf /etc/nginx/sites-enabled/upcarrera.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d admin.upcarrera.com -d admissions.upcarrera.com
# certbot rewrites this file to add the TLS listeners and the 80->443 redirect.

upstream upcarrera_api { server 127.0.0.1:3000; keepalive 16; }

server {
  listen 80;
  listen [::]:80;
  server_name admin.upcarrera.com admissions.upcarrera.com;

  # Static SPA build produced by deploy/deploy.sh (pnpm build -> apps/web/dist).
  root /opt/upcarrera/apps/web/dist;
  index index.html;

  client_max_body_size 25m;

  # API — proxy_pass with no URI part preserves the full path, so /api/... reaches
  # the Nest app unchanged (global 'api' prefix in main.ts).
  location /api/ {
    proxy_pass http://upcarrera_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # Content-hashed assets — safe to cache aggressively.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — client-side routing: any unknown path serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
